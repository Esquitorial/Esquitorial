.github/workflows/auto-dump.yml
name: Fetch Latest Blog Posts
on:
  schedule:
    - cron: '0 0 * * *' # Checks for new content every day automatically
  workflow_dispatch: # Allows you to click a button to run it manually right now

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Pull RSS Feeds
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # This pulls directly from your Substack, Blogger, and Tumblr profiles
          feed_list: "https://substack.com/feed/@Esquitorial, https://esquitorial.blogspot.com/feeds/posts/default, https://esquitorialesq.tumblr.com/rss"
          max_post_count: 5
