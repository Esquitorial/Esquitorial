name: Fetch Latest Blog Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Pull RSS Feeds
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://esquitorial.substack.com/feed, https://esquitorial.blogspot.com/feeds/posts/default, https://esquitorialesq.tumblr.com/rss"
          max_post_count: 5
